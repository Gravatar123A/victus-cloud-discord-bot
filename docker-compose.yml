version: '3.8'

services:
  victus-discord-bot:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: victus-discord-bot
    restart: unless-stopped
    env_file: .env
    # environment overrides (optional, use .env for most)
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pgrep node || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - victus-network

networks:
  victus-network:
    driver: bridge
